<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad1)"/>
  
  <!-- Barbier -->
  <circle cx="200" cy="100" r="35" fill="#d4a574"/>
  
  <!-- Cheveux courts coupe -->
  <path d="M 160 70 Q 165 50 200 45 Q 235 50 240 70" fill="#3d2817" stroke="none"/>
  <rect x="165" y="70" width="70" height="40" rx="20" fill="#3d2817"/>
  
  <!-- Corps -->
  <rect x="170" y="140" width="60" height="50" rx="10" fill="#333333"/>
  
  <!-- Ciseaux -->
  <circle cx="230" cy="120" r="4" fill="#e6b800"/>
  <circle cx="250" cy="120" r="4" fill="#e6b800"/>
  <line x1="230" y1="120" x2="250" y2="120" stroke="#e6b800" stroke-width="2"/>
  <path d="M 230 125 Q 240 140 250 135" stroke="#e6b800" stroke-width="2" fill="none"/>
  
  <!-- Tondeuse -->
  <rect x="140" y="115" width="20" height="25" fill="#c0c0c0" rx="2"/>
  <circle cx="145" cy="140" r="8" fill="#808080"/>
  
  <!-- Texte -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e6b800" text-anchor="middle">COUPE HOMME</text>
</svg>