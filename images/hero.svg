<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6b800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond dégradé -->
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  
  <!-- Motif bokeh discret -->
  <circle cx="100" cy="80" r="60" fill="#3d4f63" opacity="0.2"/>
  <circle cx="1000" cy="300" r="80" fill="#3d4f63" opacity="0.15"/>
  <circle cx="600" cy="120" r="50" fill="#3d4f63" opacity="0.1"/>
  
  <!-- Chaise barbershop -->
  <ellipse cx="300" cy="250" rx="80" ry="30" fill="#333333"/>
  <rect x="250" y="280" width="20" height="80" fill="#555555"/>
  <rect x="480" y="280" width="20" height="80" fill="#555555"/>
  <rect x="240" y="350" width="280" height="15" fill="#444444" rx="5"/>
  
  <!-- Repose-tête -->
  <ellipse cx="320" cy="200" rx="35" ry="25" fill="#1a0f0a"/>
  
  <!-- Barbier - Homme coupe -->
  <circle cx="350" cy="120" r="35" fill="#d4a574"/>
  <path d="M 320 95 Q 315 60 350 50 Q 385 60 380 95" fill="#3d2817"/>
  
  <!-- Ciseaux géants déco -->
  <g transform="translate(800, 150)">
    <circle cx="0" cy="0" r="8" fill="url(#gold)" stroke="#e6b800" stroke-width="2"/>
    <circle cx="40" cy="0" r="8" fill="url(#gold)" stroke="#e6b800" stroke-width="2"/>
    <rect x="5" y="-3" width="30" height="6" fill="url(#gold)"/>
    <path d="M 0 10 Q 20 40 40 15" stroke="url(#gold)" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Tondeuse déco -->
  <rect x="950" y="200" width="35" height="50" fill="#c0c0c0" rx="5" stroke="#e6b800" stroke-width="2"/>
  <circle cx="967.5" cy="270" r="15" fill="#808080" stroke="#e6b800" stroke-width="2"/>
  
  <!-- Texte décoratif -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="18" fill="#e6b800" text-anchor="middle" opacity="0.8">BARBER SHOP PREMIUM — COUPE • STYLE • PRÉCISION</text>
</svg>