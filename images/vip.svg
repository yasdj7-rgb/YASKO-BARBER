<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6b800;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad4)"/>
  
  <!-- Couronne/VIP en haut -->
  <path d="M 150 20 L 165 35 L 180 20 L 200 40 L 220 20 L 235 35 L 250 20" fill="url(#gold)" stroke="#e6b800" stroke-width="2"/>
  <circle cx="150" cy="25" r="5" fill="#ffd700"/>
  <circle cx="200" cy="40" r="6" fill="#ffd700"/>
  <circle cx="250" cy="25" r="5" fill="#ffd700"/>
  
  <!-- Homme avec barbe et cheveux parfaits -->
  <circle cx="200" cy="120" r="40" fill="#d4a574"/>
  
  <!-- Cheveux premium coupe moderne -->
  <path d="M 160 85 Q 160 50 200 45 Q 240 50 240 85" fill="#3d2817"/>
  <ellipse cx="200" cy="95" rx="45" ry="35" fill="#2d1810"/>
  
  <!-- Barbe bien soignée -->
  <ellipse cx="200" cy="145" rx="25" ry="28" fill="#4a3020"/>
  
  <!-- Éclat de luxe (shine) -->
  <ellipse cx="190" cy="130" rx="8" ry="12" fill="#ffffff" opacity="0.3"/>
  
  <!-- Soin du visage - serviette chaude -->
  <rect x="120" y="140" width="80" height="25" rx="5" fill="#e6b8a0" opacity="0.7"/>
  <text x="160" y="158" font-family="Arial" font-size="12" fill="#2d3e50" text-anchor="middle">Soin Visage</text>
  
  <!-- Ciseaux de luxe -->
  <g transform="translate(260, 100)">
    <circle cx="0" cy="0" r="4" fill="url(#gold)"/>
    <circle cx="16" cy="0" r="4" fill="url(#gold)"/>
    <line x1="0" y1="0" x2="16" y2="0" stroke="url(#gold)" stroke-width="2"/>
    <path d="M 0 5 Q 8 18 16 10" stroke="url(#gold)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Texte FORMULE VIP -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#gold)" text-anchor="middle">FORMULE VIP PREMIUM</text>
</svg>