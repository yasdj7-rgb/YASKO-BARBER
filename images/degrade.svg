<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#grad2)"/>
  
  <!-- Tête de profil -->
  <circle cx="150" cy="90" r="40" fill="#d4a574"/>
  
  <!-- Cheveux dégradé - haut long -->
  <path d="M 110 60 Q 100 40 130 30 Q 150 20 170 35 L 175 50 L 165 60" fill="#1a0f0a"/>
  <ellipse cx="145" cy="75" rx="45" ry="35" fill="#2d1810"/>
  
  <!-- Dégradé progression (court vers les côtés) -->
  <ellipse cx="120" cy="95" rx="15" ry="20" fill="#4a3020"/>
  <ellipse cx="175" cy="95" rx="12" ry="25" fill="#3d2817"/>
  
  <!-- Coup de tondeuse progressif -->
  <line x1="105" y1="110" x2="100" y2="130" stroke="#e6b800" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="185" y1="110" x2="195" y2="135" stroke="#e6b800" stroke-width="2" stroke-dasharray="4,4" opacity="0.6"/>
  
  <!-- Cou -->
  <rect x="130" y="130" width="40" height="30" fill="#d4a574"/>
  
  <!-- Texte -->
  <text x="280" y="140" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#e6b800">FADE</text>
  <text x="280" y="170" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.8">Dégradé</text>
</svg>